on: ["push", "pull_request"]

name: Test

concurrency:
  # Cancel older, in-progress jobs from the same PR, same workflow.
  # use run_id if the job is triggered by a push to ensure
  # push-triggered jobs to not get canceled.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
    linting:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v6

        - name: Install uv
          uses: astral-sh/setup-uv@v7
          with:
              python-version: "3.10"

        - name: Install Dependencies
          run: uv sync --group lint

        - name: Run Ruff Lint
          run: uv run ruff check .

        - name: Run Ruff Format
          run: uv run ruff format --check .

        - name: Run mdformat
          run: uv run mdformat --check *.md docs/userguides/*.md

    type-check:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v6

        - name: Install uv
          uses: astral-sh/setup-uv@v7
          with:
              python-version: "3.10"

        - name: Install Dependencies
          run: uv sync --group lint --group test

        - name: Run MyPy
          run: uv run mypy .

    functional:
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest]   # eventually add `windows-latest`
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

        steps:
        - uses: actions/checkout@v6
          with:
            fetch-depth: 0

        - name: Install Foundry
          uses: foundry-rs/foundry-toolchain@v1
          with:
              version: nightly

        - name: Install uv
          uses: astral-sh/setup-uv@v7
          with:
              python-version: ${{ matrix.python-version }}

        - name: Install Dependencies
          run: uv sync --group test

        - name: Run Tests
          run: uv run pytest -m "not fork and not manual and not fuzzing" -n auto
          env:
            RUST_BACKTRACE: full

        - name: Run Fork Tests (Alchemy)
          # Only run tests requiring Alchemy if not from a forked repo
          if: github.event.pull_request.head.repo.full_name == github.repository
          run: |
            # First run: stepwise through tests until a failure
            uv run pytest -m fork --stepwise --maxfail=1
        
            # Second run: retry only tests that failed last time
            uv run pytest -m fork --last-failed --last-failed-no-failures
          env:
            RUST_BACKTRACE: full
            WEB3_ALCHEMY_PROJECT_ID: ${{ secrets.WEB3_ALCHEMY_PROJECT_ID }}

